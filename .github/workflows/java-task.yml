name: Java Doker Task

on: 
  push: 
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Java application
        run: |
          mkdir -p build
          javac --release 17 -d build src/Main.java
          jar cfe app.jar Main -C build .

      - name: Build docker image
        run: docker build --platform=linux/amd64 -t student-java-app .

      - name: Run Docker container   
        run: docker run --rm student-java-app

      - name: Show image size
        run: docker images student-java-app

      - name: Check containers
        run: docker ps -a
      
         
